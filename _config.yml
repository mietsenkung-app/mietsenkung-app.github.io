title: Mietsenkung
description: Schweizer App, die in 2 Minuten prüft ob dir eine Mietsenkung zusteht und das Senkungsbegehren mit einem Tap per Post versendet.
url: https://mietsenkung-app.ch
lang: de-CH
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# A5 Pre-Launch-Newsletter-Capture. Manuel ersetzt das nach Formspree-
# Account-Anlage (siehe docs/marketing/newsletter-setup.md). Solange leer
# rendert die Form mit visuell-disabled state + "Coming soon"-Hint statt
# einer broken Formspree-URL.
formspree_endpoint: ""
exclude:
  - README.md
  - .gitignore
  - vendor
  - Gemfile
  - Gemfile.lock
