title: Mietsenkung
description: Schweizer App, die in 2 Minuten prüft ob dir eine Mietsenkung zusteht und das Senkungsbegehren mit einem Tap per Post versendet.
url: https://mietsenkung-app.ch
lang: de-CH
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
exclude:
  - README.md
  - .gitignore
  - vendor
  - Gemfile
  - Gemfile.lock
