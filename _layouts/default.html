<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'de-CH' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <meta name="robots" content="index,follow">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <header class="site">
    <a class="brand" href="{{ '/' | relative_url }}">Mietsenkung</a>
    <nav>
      <a href="{{ '/privacy-de.html' | relative_url }}">Datenschutz</a>
      <a href="{{ '/privacy-en.html' | relative_url }}">Privacy (EN)</a>
      <a href="{{ '/impressum.html' | relative_url }}">Impressum</a>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
  <footer class="site">
    <p>© {{ 'now' | date: '%Y' }} Manuel Weingartner — Mietsenkung App</p>
  </footer>
</body>
</html>
